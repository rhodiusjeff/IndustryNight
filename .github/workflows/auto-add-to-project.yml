name: Auto-add to project

on:
  issues:
    types: [opened]
  pull_request:
    types: [opened]

jobs:
  add-to-project:
    name: Add to project
    runs-on: ubuntu-latest
    steps:
      - uses: actions/add-to-project@v1
        with:
          project-url: https://github.com/users/rhodiusjeff/projects/1
          github-token: ${{ secrets.ADD_TO_PROJECT_PAT }}
