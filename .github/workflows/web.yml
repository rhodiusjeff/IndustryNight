name: Web App CI/CD

on:
  push:
    branches: [main]
    paths:
      - 'packages/web-app/**'
      - 'packages/shared/**'
      - '.github/workflows/web.yml'
  pull_request:
    branches: [main]
    paths:
      - 'packages/web-app/**'
      - 'packages/shared/**'
      - '.github/workflows/web.yml'

env:
  AWS_REGION: us-east-1
  S3_BUCKET: industrynight-web-admin
  CLOUDFRONT_DISTRIBUTION_ID: ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.16.x'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: |
          cd packages/shared && flutter pub get
          cd ../../packages/web-app && flutter pub get

      - name: Generate code
        working-directory: packages/shared
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Analyze
        working-directory: packages/web-app
        run: flutter analyze

  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.16.x'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: |
          cd packages/shared && flutter pub get
          cd ../../packages/web-app && flutter pub get

      - name: Generate code
        working-directory: packages/shared
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Run tests
        working-directory: packages/web-app
        run: flutter test

  build-and-deploy:
    name: Build and Deploy
    needs: [analyze, test]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.16.x'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: |
          cd packages/shared && flutter pub get
          cd ../../packages/web-app && flutter pub get

      - name: Generate code
        working-directory: packages/shared
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build web
        working-directory: packages/web-app
        run: flutter build web --release

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy to S3
        run: |
          aws s3 sync packages/web-app/build/web s3://${{ env.S3_BUCKET }} \
            --delete \
            --cache-control "max-age=31536000" \
            --exclude "index.html" \
            --exclude "flutter_service_worker.js"

          # Index and service worker should not be cached
          aws s3 cp packages/web-app/build/web/index.html s3://${{ env.S3_BUCKET }}/index.html \
            --cache-control "no-cache"
          aws s3 cp packages/web-app/build/web/flutter_service_worker.js s3://${{ env.S3_BUCKET }}/flutter_service_worker.js \
            --cache-control "no-cache"

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ env.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"
