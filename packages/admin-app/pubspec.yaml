name: industrynight_admin
description: Industry Night admin dashboard
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.8.0

dependencies:
  flutter:
    sdk: flutter
  industrynight_shared:
    path: ../shared

  # State management
  provider: ^6.1.1

  # Navigation
  go_router: ^13.0.1

  # UI
  data_table_2: ^2.5.10
  fl_chart: ^0.66.0
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  build_runner: ^2.4.7

flutter:
  uses-material-design: true
  assets:
    - assets/logo.png
