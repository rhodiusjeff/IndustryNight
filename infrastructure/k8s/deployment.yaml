apiVersion: apps/v1
kind: Deployment
metadata:
  name: industrynight-api
  namespace: industrynight
  labels:
    app: industrynight-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: industrynight-api
  template:
    metadata:
      labels:
        app: industrynight-api
    spec:
      serviceAccountName: industrynight-api
      containers:
        - name: api
          image: ${AWS_ACCOUNT_ID}.dkr.ecr.us-east-1.amazonaws.com/industrynight-api:latest
          ports:
            - containerPort: 3000
          envFrom:
            - secretRef:
                name: industrynight-secrets
          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "3000"
            - name: AWS_REGION
              value: "us-east-1"
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 5
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - industrynight-api
                topologyKey: kubernetes.io/hostname
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: industrynight-api-hpa
  namespace: industrynight
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: industrynight-api
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
